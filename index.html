function startTest(testName){

// SHOW QUESTION

function showQuestion(){

if(!currentQuestions || currentQuestions.length === 0){
console.error("No questions loaded")
return
}

let q = currentQuestions[currentIndex]   // 🔥 THIS WAS MISSING

let progress = ((currentIndex + 1) / currentQuestions.length) * 100
document.getElementById("progressBar").style.width = progress + "%"

document.getElementById("questionNumber").innerText =
"Question " + (currentIndex+1) + " / " + currentQuestions.length

document.getElementById("questionText").innerText = q.question
document.getElementById("questionText").style.color = "";

let answersDiv = document.getElementById("answers")
answersDiv.innerHTML = ""

q.answers.forEach((a,i)=>{

let label = document.createElement("label")

let checkbox = document.createElement("input")
checkbox.type = "checkbox"
checkbox.value = i
if(q.answered){
checkbox.disabled = true;
}

label.appendChild(checkbox)
label.appendChild(document.createTextNode(" " + a))

answersDiv.appendChild(label)
answersDiv.appendChild(document.createElement("br"))

})
if(userAnswers[currentIndex]){
let inputs = answersDiv.querySelectorAll("input");

userAnswers[currentIndex].forEach(i=>{
if(inputs[i]){
inputs[i].checked = true;
}
});
}

document.getElementById("prevBtn").disabled = currentIndex === 0;
window.scrollTo(0,0);
updateQuestionGrid()

// ENABLE INPUTS AGAIN
document.querySelectorAll("#answers input").forEach(el=>{
el.disabled = false;
});
}


// NEXT QUESTION

function nextQuestion(){

// ❗ BLOCK IF NOT ANSWERED
if(userAnswers[currentIndex] === undefined){
alert("Submit your answer first!");
return;
}

// 👉 IF LAST → RESULT
if(currentIndex >= currentQuestions.length - 1){
showResult();
return;
}

// NEXT
currentIndex++;
showQuestion();

}
function submitAnswer(){

let q = currentQuestions[currentIndex];

// GET SELECTED
let selected = [];
document.querySelectorAll("#answers input:checked").forEach(el=>{
selected.push(parseInt(el.value));
});

// ❗ PREVENT EMPTY
if(selected.length === 0){
alert("Select an answer first!");
return;
}

// SAVE
userAnswers[currentIndex] = selected;

// CHECK
let correct = [...(q.correct || [])].sort();
let user = [...selected].sort();

let isCorrect = JSON.stringify(user) === JSON.stringify(correct);

// COUNT ONLY ONCE
if(!q.answered){
if(isCorrect){
correctAnswers++;
}
q.answered = true;
}

// REMOVE OLD INFO
let old = document.getElementById("correctInfo");
if(old) old.remove();

// COLOR + SHOW CORRECT
let qText = document.getElementById("questionText");

if(isCorrect){
qText.style.color = "green";
} else {
qText.style.color = "red";

let correctText = q.correct.map(i => q.answers[i]).join(", ");

let info = document.createElement("div");
info.id = "correctInfo";
info.style.marginTop = "10px";
info.style.fontWeight = "bold";
info.style.color = "#22c55e";
info.innerText = "Correct answer: " + correctText;

document.getElementById("answers").appendChild(info);
}

// 🔒 DISABLE ANSWERS AFTER SUBMIT
document.querySelectorAll("#answers input").forEach(el=>{
el.disabled = true;
});

// UPDATE GRID
updateQuestionGrid();

}
function previousQuestion(){

currentIndex--
showQuestion()

function showTopicDashboard(){

let resultDiv = document.getElementById("result");

// 🧠 BUILD STATS
let stats = {};

currentQuestions.forEach((q,i)=>{

    let topicsList = Array.isArray(q.topic) ? q.topic : [q.topic || "General"];

topicsList.forEach(topic => {

if(!stats[topic]){
stats[topic] = { total: 0, correct: 0 };
}

stats[topic].total++;

let user = userAnswers[i] || [];
let correct = q.correct || [];

if(JSON.stringify([...user].sort()) === JSON.stringify([...correct].sort())){
stats[topic].correct++;
}

});

if(!stats[topic]){
stats[topic] = {
total: 0,
correct: 0
};
}

stats[topic].total++;

let user = userAnswers[i] || [];
let correct = q.correct || [];

if(JSON.stringify([...user].sort()) === JSON.stringify([...correct].sort())){
stats[topic].correct++;
}

});

// 🎨 BUILD HTML
let html = `<h2>📊 Topics Dashboard</h2><br>`;

// IF NO DATA
if(Object.keys(stats).length === 0){
html += `<p>No data yet. Complete a test first.</p>`;
}

Object.keys(stats).forEach(topic=>{

let t = stats[topic];
let percent = t.total === 0 ? 0 : Math.round((t.correct / t.total) * 100);

html += `
<div class="topicCard">
<h3>${topic}</h3>
<p>Correct: ${t.correct} / ${t.total}</p>
<p>Accuracy: ${percent}%</p>

<div class="topicBar">
<div class="topicFill" style="width:${percent}%"></div>
</div>
</div>
`;

});

// BACK BUTTON
html += `
<br>
<button onclick="goToMenu()">🏠 Back</button>
`;

// SHOW SCREEN
document.getElementById("menu").style.display = "none";
document.getElementById("quiz").style.display = "none";
resultDiv.style.display = "block";
resultDiv.innerHTML = html;

}

function createQuestionGrid(){

let grid = document.getElementById("questionGrid")
grid.innerHTML = ""

currentQuestions.forEach((q,i)=>{

box.innerText = i+1

}

function updateQuestionGrid(){

let boxes = document.querySelectorAll(".questionBox");

boxes.forEach((box,i)=>{

box.classList.remove("questionCurrent","questionAnswered","questionCorrect","questionWrong");

if(i === currentIndex){
box.classList.add("questionCurrent");
}

if(userAnswers[i] !== undefined){

box.classList.add("questionAnswered"); // 🔵 BLUE

let q = currentQuestions[i];

let correct = [...(q.correct || [])].sort();
let user = (userAnswers[i] || []).sort();

if(JSON.stringify(user) === JSON.stringify(correct)){
box.classList.add("questionCorrect"); // 🟢
}else{
box.classList.add("questionWrong"); // 🔴
}

}

});

}

// SHUFFLE FUNCTION

function shuffle(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))
[array[i],array[j]]=[array[j],array[i]]

}

}
function startTimer(){

clearInterval(timer)

timer = setInterval(function(){

timeLeft--

let minutes = Math.floor(timeLeft/60)
let seconds = timeLeft % 60

document.getElementById("timer").innerText =
minutes + ":" + (seconds < 10 ? "0"+seconds : seconds)

if(timeLeft <= 0){
clearInterval(timer)
showResult()
}

},1000)

}

function showTopicSelector(){

let resultDiv = document.getElementById("result");

// 🔥 GET ALL UNIQUE TOPICS
let topics = new Set();

Object.values(tests).forEach(test=>{
test.forEach(q=>{
    if(Array.isArray(q.topic)){
q.topic.forEach(t => topics.add(t));
} else {
topics.add(q.topic || "General");
}
});
});

// 🎨 BUILD UI
let html = `<h2>📚 Select Topic</h2><br>`;

topics.forEach(topic=>{
html += `
<button class="topicSelectBtn" onclick="startTopicTest('${topic}')">
${topic}
</button>
`;
});

html += `
<br><br>
<button onclick="goToMenu()">🏠 Back</button>
`;

document.getElementById("menu").style.display = "none";
resultDiv.style.display = "block";
resultDiv.innerHTML = html;

}
function startTopicTest(selectedTopic){

let allQuestions = [];

Object.values(tests).forEach(test=>{
test.forEach(q=>{
    if(
(Array.isArray(q.topic) && q.topic.includes(selectedTopic)) ||
(q.topic === selectedTopic)
){
allQuestions.push(q);
}
});
});

// ❗ safety
if(allQuestions.length === 0){
alert("No questions for this topic");
return;
}

// shuffle
allQuestions.sort(()=>Math.random()-0.5);

// limit (optional)
currentQuestions = allQuestions.slice(0, 40);

// reset
currentIndex = 0;
correctAnswers = 0;
userAnswers = [];

// show quiz
document.getElementById("menu").style.display = "none";
document.getElementById("result").style.display = "none";
document.getElementById("quiz").style.display = "block";

// start
createQuestionGrid();
timeLeft = 2400;
startTimer();
showQuestion();

}

});

}

if(saved){
document.body.classList.add("dark");

// update buttons
document.querySelectorAll(".darkToggle").forEach(btn=>{
btn.innerText = saved ? "☀️" : "🌙";
});
